name: Deploy

on:
  # 手动触发部署（推荐）
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        type: choice
        options:
        - staging
        - production
      rollback:
        description: '是否回滚'
        type: boolean
        default: false

  # 在创建 release tag 时自动部署到 production
  push:
    tags:
      - 'v*'
    inputs:
      environment:
        description: '部署环境'
        required: true
        type: choice
        options:
        - staging
        - production
      rollback:
        description: '是否回滚'
        type: boolean
        default: false

env:
  NODE_VERSION: '24.x'
  ACTIONS_RUNNER_DISABLE_JOB_CACHE: 'true'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # 预发布环境部署
  deploy-staging:
    name: 部署到预发布环境
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, macos-arm64]
    timeout-minutes: 30
    environment:
      name: staging
      url: https://staging.yunpat.com

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 安装依赖
        run: pnpm install --no-frozen-lockfile --prefer-offline
        env:
          HUSKY: 0

      - name: 🧪 运行测试
        run: |
          echo "🧪 运行测试..."
          pnpm --filter @yunpat/core test -- --run --exclude="**/*integration*.test.ts"
        timeout-minutes: 15

      - name: 🏗️ 构建项目
        run: |
          echo "🏗️ 构建项目..."
          pnpm build
        timeout-minutes: 20

      - name: 🚀 部署到预发布环境
        run: |
          echo "🚀 部署到预发布环境..."
          ./scripts/deploy.sh staging
        env:
          DEPLOYMENT_ENVIRONMENT: staging

      - name: 🔍 健康检查
        run: |
          echo "🔍 健康检查..."
          # 这里添加实际的健康检查命令
          curl -f https://staging.yunpat.com/health || exit 1
        timeout-minutes: 5

      - name: 🧹 清理
        if: always()
        run: rm -rf ~/actions-runner/_work/_temp/*

  # 生产环境部署（手动触发）
  deploy-production:
    name: 部署到生产环境
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, macos-arm64]
    timeout-minutes: 45
    environment:
      name: production
      url: https://yunpat.com

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 安装依赖
        run: pnpm install --no-frozen-lockfile
        env:
          HUSKY: 0

      - name: 🧪 完整测试套件
        run: |
          echo "🧪 运行完整测试套件..."
          pnpm test
        timeout-minutes: 30

      - name: 🏗️ 生产构建
        run: |
          echo "🏗️ 生产环境构建..."
          pnpm build:production
        timeout-minutes: 25

      - name: 🚀 部署到生产环境
        run: |
          echo "🚀 部署到生产环境..."
          if [ "${{ inputs.rollback }}" = "true" ]; then
            echo "🔄 回滚模式"
            ./scripts/deploy.sh production rollback
          else
            echo "📦 正常部署"
            ./scripts/deploy.sh production
          fi
        env:
          DEPLOYMENT_ENVIRONMENT: production

      - name: 🔍 生产健康检查
        run: |
          echo "🔍 生产环境健康检查..."
          curl -f https://yunpat.com/health || exit 1
        timeout-minutes: 5

      - name: 📊 部署报告
        if: success()
        run: |
          echo "📊 部署报告"
          echo "环境: production"
          echo "提交: ${{ github.sha }}"
          echo "时间: $(date)"
          # 这里可以发送部署通知

      - name: 🧹 清理
        if: always()
        run: rm -rf ~/actions-runner/_work/_temp/*

  # NPM 包发布
  publish-npm:
    name: 发布到 NPM
    if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, macos-arm64]
    timeout-minutes: 30

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 安装依赖
        run: pnpm install

      - name: 🏗️ 构建
        run: pnpm build

      - name: 📦 发布到 NPM
        run: |
          echo "📦 发布到 NPM..."
          # 这里添加实际的 NPM 发布命令
          # pnpm publish --access public --no-git-checks
          echo "✅ NPM 发布完成"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 🧹 清理
        if: always()
        run: rm -rf ~/actions-runner/_work/_temp/*
