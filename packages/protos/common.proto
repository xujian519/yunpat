syntax = "proto3";

package yunpat.common;

// 通用类型定义

// 执行状态
enum StatusCode {
  UNKNOWN = 0;
  SUCCESS = 1;
  FAILURE = 2;
  TIMEOUT = 3;
  CANCELLED = 4;
}

// 任务优先级
enum Priority {
  LOW = 0;
  MEDIUM = 1;
  HIGH = 2;
  URGENT = 3;
}

// 通用错误响应
message ErrorResponse {
  StatusCode code = 1;
  string message = 2;
  map<string, string> details = 3;
}

// 元数据
message Metadata {
  map<string, string> tags = 1;
  int64 created_at = 2;
  int64 updated_at = 3;
}

// 分页请求
message PageRequest {
  int32 page = 1;
  int32 page_size = 2;
  string sort_by = 3;
  bool ascending = 4;
}

// 分页响应
message PageResponse {
  int32 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
}
