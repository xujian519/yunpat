name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # =============================================================================
  # Rust CI
  # =============================================================================
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libleptonica-dev libtesseract-dev tesseract-ocr pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Check Format
        run: cd crates && cargo fmt --all -- --check

      - name: Run Clippy
        run: cd crates && cargo clippy --workspace --all-targets --all-features -- -D warnings -A clippy::uninlined-format-args -A clippy::const-is-empty

      - name: Build Rust
        run: cd crates && cargo build --workspace

      - name: Test Rust
        run: cd crates && cargo test --workspace --all-features

  # =============================================================================
  # TypeScript CI
  # =============================================================================
  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: cd packages && pnpm install --frozen-lockfile

      - name: Lint TypeScript
        run: cd packages && pnpm lint

      - name: Check Format
        run: cd packages && pnpm format:check

      - name: Build TypeScript
        run: cd packages && pnpm build

      - name: Test TypeScript
        run: cd packages && pnpm test:mock

  # =============================================================================
  # Integration Tests
  # =============================================================================
  integration:
    name: Integration Tests
    needs: [rust-check, typescript-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libleptonica-dev libtesseract-dev tesseract-ocr pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd packages && pnpm install --frozen-lockfile

      - name: Build All
        run: |
          cd crates && cargo build --workspace --release
          cd ../packages && pnpm build

      - name: MCP Integration Test
        run: |
          echo "Testing MCP connectivity..."
          # TODO: Add MCP integration tests

      - name: End-to-End Test
        run: |
          echo "Running E2E tests..."
          # TODO: Add E2E tests

  # =============================================================================
  # Release
  # =============================================================================
  release:
    name: Release
    needs: [rust-check, typescript-check, integration]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Release Artifacts
        run: |
          echo "Building release artifacts..."
          # TODO: Implement release build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/release/deepseek
          generate_release_notes: true
