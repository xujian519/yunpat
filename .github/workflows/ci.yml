name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: 8

jobs:
  # TypeScript 代码质量检查
  quality:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史用于更好的分析

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行 ESLint
        run: pnpm lint

      - name: TypeScript 类型检查
        run: pnpm build:tsc

      - name: 检查代码格式
        run: pnpm exec prettier --check "**/*.{ts,js,json,md}"

  # TypeScript 测试
  test-typescript:
    name: TypeScript 测试 (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]
        fail-fast: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建项目
        run: pnpm build

      - name: 运行测试
        run: pnpm test -- --run

      - name: 生成覆盖率报告
        if: matrix.node-version == '20.x'
        run: pnpm test -- --coverage

      - name: 上传覆盖率到 Codecov
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v3
        with:
          files: ./packages/core/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Rust 测试
  test-rust:
    name: Rust 工具测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: rustfmt, clippy
          override: true

      - name: 缓存 Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/rust-tools/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rust 格式检查
        working-directory: packages/rust-tools
        run: cargo fmt -- --check

      - name: Rust Clippy 检查
        working-directory: packages/rust-tools
        run: cargo clippy -- -D warnings

      - name: 构建 Rust 项目
        working-directory: packages/rust-tools
        run: cargo build --verbose

      - name: 运行 Rust 测试
        working-directory: packages/rust-tools
        run: cargo test --verbose

      - name: 生成 Rust 文档
        working-directory: packages/rust-tools
        run: cargo doc --no-deps

  # Python 工具测试
  test-python:
    name: Python 工具测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖
        working-directory: docker/python-tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行 Python 测试
        working-directory: docker/python-tools
        run: |
          python -m pytest tests/ -v --cov=. --cov-report=xml
        continue-on-error: true

  # Docker 构建测试
  test-docker:
    name: Docker 构建测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建 Python 工具镜像
        working-directory: docker/python-tools
        run: |
          docker build -t yunpat-python-tools:test .
          docker images yunpat-python-tools:test

      - name: 测试 Docker 镜像
        run: |
          docker run --rm yunpat-python-tools:test python --version

  # 安全检查
  security:
    name: 安全检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 npm audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: 检查依赖漏洞
        run: pnpm audit --json

  # 构建产物
  build:
    name: 构建产物
    runs-on: ubuntu-latest
    needs: [quality, test-typescript, test-rust]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建所有包
        run: pnpm build

      - name: 构建 Rust 项目
        working-directory: packages/rust-tools
        run: cargo build --release

      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: |
            packages/*/dist
            packages/rust-tools/target/release/patent-cli
          retention-days: 7

      - name: 生成构建信息
        run: |
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV

      - name: 上传构建信息
        uses: actions/upload-artifact@v3
        with:
          name: build-info
          path: |
            ${{ env.BUILD_TIME }}
            ${{ env.COMMIT_SHA }}
            ${{ env.RUN_ID }}