flow_id: drafting
flow_name: 专利撰写
description: 从技术交底书到专利申请文件的完整撰写流程
steps:
  - step_id: understand_invention
    step_name: 发明理解与提取
    order: 1
    agent_calls:
      - agent_id: drafting
        output_key: invention_summary
    requires_approval: false

  - step_id: prior_art_search
    step_name: 现有技术检索
    order: 2
    agent_calls:
      - agent_id: drafting
        output_key: prior_art
    requires_approval: false

  - step_id: claim_drafting
    step_name: 权利要求书撰写
    order: 3
    agent_calls:
      - agent_id: drafting
        output_key: claims
    requires_approval: true
    approval_prompt: 请审核权利要求书，确认保护范围是否合理？

  - step_id: specification_drafting
    step_name: 说明书撰写
    order: 4
    agent_calls:
      - agent_id: drafting
        output_key: specification
    requires_approval: true
    approval_prompt: 请审核说明书，确认技术方案描述是否完整？

  - step_id: final_review
    step_name: 整体审查与定稿
    order: 5
    agent_calls:
      - agent_id: drafting
        output_key: final_document
    requires_approval: true
    approval_prompt: 最终申请文件是否可以提交？
    quality_check:
      dimensions:
        - 权利要求清晰性
        - 说明书充分公开
        - 技术方案完整性
        - 用语一致性
        - 格式规范性
      threshold: 7.5
      max_auto_retries: 2
      escalate_to_human: true

quality_dimensions:
  - name: 权利要求清晰性
    description: 权利要求的范围界定是否清晰
    weight: 0.25
  - name: 说明书充分公开
    description: 说明书是否充分公开了技术方案
    weight: 0.25
  - name: 技术方案完整性
    description: 是否涵盖了所有必要的实施方式
    weight: 0.20
  - name: 用语一致性
    description: 全文术语使用是否一致
    weight: 0.15
  - name: 格式规范性
    description: 是否符合专利申请格式要求
    weight: 0.15
