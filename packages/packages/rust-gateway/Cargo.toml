[package]
name = "yunpat-gateway"
version = "0.0.1"
edition = "2021"
description = "YunPat Rust Gateway - 统一网关服务"
authors = ["Xu Jian <xujian519@gmail.com>"]
license = "MIT"

[dependencies]
# Web 框架
axum = { version = "0.8", features = ["ws"] }
tokio = { version = "1.35", features = ["full"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "compression-br"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 异步
async-trait = "0.1"
futures = "0.3"
async-stream = "0.3"
tokio-stream = "0.1"

# 日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# 指标监控
metrics = "0.24"
metrics-exporter-prometheus = "0.16"

# 工具
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# HTTP 客户端（调用 Node.js）
reqwest = { version = "0.12", features = ["json", "stream"] }

# 错误处理
anyhow = "1.0"
thiserror = "1.0"

# 数据库（可选，后期）
# sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"], optional = true }

[dev-dependencies]
tower-test = "0.4"

[features]
default = []
# database = ["sqlx"]

[[bin]]
name = "yunpat-gateway"
path = "src/main.rs"

[workspace]
