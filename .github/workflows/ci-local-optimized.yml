name: CI (Local Runner - Optimized v2)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '24.x'
  PNPM_VERSION: 9
  # 本地 Runner 环境变量
  ACTIONS_RUNNER_DISABLE_JOB_CACHE: 'true'
  CANVAS_USE_NATIVE: '0'
  PUPPETEET_SKIP_DOWNLOAD: 'true'
  # 资源优化配置
  NODE_OPTIONS: '--max-old-space-size=4096'
  RUST_BACKTRACE: '1'

# 并发控制：限制同时运行的任务数
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 快速检查（本地 Runner 优化）
  quick-checks:
    name: 快速检查
    runs-on: [self-hosted, macos-arm64]
    timeout-minutes: 20

    # 限制并发数，避免资源耗尽
    strategy:
      max-parallel: 2

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 系统资源检查
        run: |
          echo "=== 系统资源检查 ==="
          echo "CPU核心数: $(sysctl -n hw.ncpu)"
          echo "可用内存: $(vm_stat | grep "Pages free" | awk '{print $3 * 16384 / 1024 / 1024}') MB"
          echo "磁盘空间: $(df -h . | tail -1 | awk '{print $4}') 可用"
          echo ""

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 智能依赖安装
        run: |
          echo "📦 使用智能缓存策略..."
          # 检查 lockfile 是否变更
          if git diff --name-only HEAD~1 HEAD | grep -q "pnpm-lock.yaml"; then
            echo "🔄 lockfile 变更，完整安装..."
            pnpm install --no-frozen-lockfile
          else
            echo "✅ lockfile 未变更，使用离线缓存..."
            pnpm install --no-frozen-lockfile --prefer-offline --frozen-lockfile=false
          fi
        env:
          HUSKY: 0

      - name: 🔍 TypeScript 类型检查（增量）
        run: |
          echo "🔍 增量 TypeScript 类型检查..."
          # 只检查变更的文件
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E "\.ts$" || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "检查的文件:"
            echo "$CHANGED_FILES"
            pnpm build:tsc
          else
            echo "✅ 没有 TypeScript 文件变更，跳过"
          fi
        timeout-minutes: 8

      - name: 📋 代码格式检查（仅变更文件）
        run: |
          echo "📋 检查变更文件的格式..."
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E "\.(ts|js|json|md)$" || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "检查的文件:"
            echo "$CHANGED_FILES"
            pnpm exec prettier --check $CHANGED_FILES || true
          else
            echo "✅ 没有格式相关文件变更，跳过"
          fi
        continue-on-error: true

      - name: 🧪 快速单元测试（内存优化）
        run: |
          echo "🧪 运行核心包测试（内存优化模式）..."
          # 限制并发数，避免内存耗尽
          pnpm --filter @yunpat/core test -- --run --threads --reporter=dot
        timeout-minutes: 12
        env:
          NODE_OPTIONS: '--max-old-space-size=3072'

      - name: 🧹 清理工作目录
        if: always()
        run: |
          echo "🧹 清理临时文件..."
          rm -rf ~/actions-runner/_work/_temp/*
          rm -rf ./*.log
          echo "✅ 清理完成"

  # 并行测试任务（使用矩阵策略）
  parallel-tests:
    name: 并行测试 - 分片 ${{ matrix.shard }}/${{ matrix.total }}
    runs-on: [self-hosted, macos-arm64]
    needs: quick-checks
    timeout-minutes: 18

    strategy:
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
      fail-fast: false
      max-parallel: 2  # 限制并发数

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 快速安装依赖
        run: pnpm install --no-frozen-lockfile --prefer-offline
        env:
          HUSKY: 0

      - name: 🧪 运行测试分片 ${{ matrix.shard }}/${{ matrix.total }}
        run: |
          echo "🧪 运行测试分片 ${{ matrix.shard }}/${{ matrix.total }}..."
          pnpm --filter @yunpat/core test -- \
            --run \
            --shard=${{ matrix.shard }}/${{ matrix.total }} \
            --reporter=dot \
            --reporter=json > test-results-${{ matrix.shard }}.json || echo "⚠️ 分片测试完成"
        timeout-minutes: 15
        env:
          NODE_OPTIONS: '--max-old-space-size=3072'

      - name: 📊 上传测试结果
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: |
            test-results-${{ matrix.shard }}.json
            **/coverage/

      - name: 🧹 清理
        if: always()
        run: rm -rf ~/actions-runner/_work/_temp/*

  # 增量构建（仅构建变更的包）
  incremental-build:
    name: 增量构建
    runs-on: [self-hosted, macos-arm64]
    needs: quick-checks
    timeout-minutes: 25

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 快速安装依赖
        run: pnpm install --no-frozen-lockfile --prefer-offline
        env:
          HUSKY: 0

      - name: 🔍 分析变更的包
        id: changes
        run: |
          echo "🔍 分析变更的包..."
          CHANGED_PACKAGES=$(git diff --name-only HEAD~1 HEAD | grep -E "^packages/" | cut -d'/' -f2 | sort -u || true)
          echo "changed_packages=$CHANGED_PACKAGES" >> $GITHUB_OUTPUT

          if [ -n "$CHANGED_PACKAGES" ]; then
            echo "📦 变更的包:"
            echo "$CHANGED_PACKAGES"
          else
            echo "✅ 没有包变更，跳过构建"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          fi

      - name: 🏗️ 增量构建变更的包
        if: steps.changes.outputs.skip_build != 'true'
        run: |
          echo "🏗️ 增量构建..."
          # 只构建变更的包及其依赖
          if [ -n "${{ steps.changes.outputs.changed_packages }}" ]; then
            for pkg in ${{ steps.changes.outputs.changed_packages }}; do
              echo "构建包: $pkg"
              pnpm --filter "@yunpat/$pkg" build || echo "⚠️ 包 $pkg 构建失败"
            done
          else
            echo "构建所有包..."
            pnpm build
          fi
        timeout-minutes: 20
        env:
          NODE_OPTIONS: '--max-old-space-size=3072'

      - name: 🏗️ 完整构建（如果没有变更）
        if: steps.changes.outputs.skip_build == 'true'
        run: |
          echo "✅ 没有变更，验证现有构建..."
          pnpm build --verify || pnpm build
        timeout-minutes: 15

      - name: 📦 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: dist-${{ github.sha }}
          path: |
            packages/*/dist
            packages/*/build
          retention-days: 7

      - name: 🧹 清理
        if: always()
        run: rm -rf ~/actions-runner/_work/_temp/*

  # Rust 工具链检查（带重试机制）
  rust-checks:
    name: Rust 工具链检查
    runs-on: [self-hosted, macos-arm64]
    if: github.event_name == 'push'
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 检查 Rust 环境
        run: |
          echo "=== Rust 环境检查 ==="
          if command -v rustc &> /dev/null; then
            echo "✅ Rust 版本: $(rustc --version)"
            echo "✅ Cargo 版本: $(cargo --version)"
            echo "✅ Rustup 版本: $(rustup --version)"
          else
            echo "⚠️ Rust 未安装，跳过 Rust 检查"
            exit 0
          fi

      - name: 🔍 分析 Rust 代码变更
        id: rust-changes
        run: |
          RUST_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E "\.rs$" | grep -v "^target/" || true)
          if [ -n "$RUST_CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "🔧 Rust 文件变更:"
            echo "$RUST_CHANGED"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ 没有 Rust 文件变更，跳过构建"
          fi

      - name: 🏗️ 构建 Rust 组件（带重试）
        if: steps.rust-changes.outputs.has_changes == 'true'
        uses: nick-fields/retry-action@v2
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: |
            if [ -d "packages/rust-tools" ]; then
              echo "🏗️ 增量构建 Rust 组件..."
              cd packages/rust-tools
              # 清理之前的构建，避免增量问题
              cargo clean || true
              # 使用 --release 构建，但限制优化级别以加快速度
              CARGO_PROFILE_RELEASE_DEBUG=0 cargo build --release || echo "⚠️ Rust 构建失败"
              echo "✅ Rust 构建完成"
            else
              echo "⚠️ 未找到 Rust 组件目录"
            fi
        env:
          RUST_BACKTRACE: '1'

      - name: 🧪 Rust 单元测试（带重试）
        if: steps.rust-changes.outputs.has_changes == 'true'
        uses: nick-fields/retry-action@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: error
          command: |
            if [ -d "packages/rust-tools" ]; then
              echo "🧪 运行 Rust 测试..."
              cd packages/rust-tools
              cargo test --release || echo "⚠️ Rust 测试失败"
            fi
        env:
          RUST_BACKTRACE: '1'

      - name: 📊 Rust 代码质量检查
        if: steps.rust-changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: |
          if [ -d "packages/rust-tools" ]; then
            echo "📊 Rust 代码质量检查..."
            cd packages/rust-tools
            # 安装 cargo-if-changed（如果未安装）
            cargo install cargo-if-changed || true
            # 只检查变更的文件
            cargo check --all-targets || echo "⚠️ 代码检查失败"
            # Clippy 检查
            cargo clippy -- -D warnings || echo "⚠️ Clippy 检查失败"
          fi

      - name: 🧹 清理
        if: always()
        run: |
          if [ -d "packages/rust-tools" ]; then
            cd packages/rust-tools
            cargo clean || true
          fi
          rm -rf ~/actions-runner/_work/_temp/*

  # 代码质量检查（并行）
  quality:
    name: 代码质量 - ${{ matrix.check }}
    runs-on: [self-hosted, macos-arm64]
    needs: quick-checks
    continue-on-error: true
    timeout-minutes: 12

    strategy:
      matrix:
        check: [eslint, prettier, complexity]
      fail-fast: false
      max-parallel: 2

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 快速安装依赖
        run: pnpm install --no-frozen-lockfile --prefer-offline
        env:
          HUSKY: 0

      - name: 🔍 ESLint 检查
        if: matrix.check == 'eslint'
        run: |
          echo "🔍 运行 ESLint..."
          # 只检查变更的文件
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E "\.ts$" | tr '\n' ' ' || true)
          if [ -n "$CHANGED_FILES" ]; then
            pnpm exec eslint $CHANGED_FILES || echo "⚠️ Lint 检查发现问题"
          else
            echo "✅ 没有 TypeScript 文件变更"
          fi
        continue-on-error: true

      - name: 📋 Prettier 格式检查
        if: matrix.check == 'prettier'
        run: |
          echo "📋 检查代码格式..."
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E "\.(ts|js|json|md)$" | tr '\n' ' ' || true)
          if [ -n "$CHANGED_FILES" ]; then
            pnpm exec prettier --check $CHANGED_FILES || echo "⚠️ 格式检查发现问题"
          else
            echo "✅ 没有格式相关文件变更"
          fi
        continue-on-error: true

      - name: 📊 复杂度分析
        if: matrix.check == 'complexity'
        run: |
          echo "📊 分析代码复杂度..."
          # 使用 complexity-report 或类似工具
          pnpm exec complexity-report --format json || echo "⚠️ 复杂度分析失败"
        continue-on-error: true

      - name: 🧹 清理
        if: always()
        run: rm -rf ~/actions-runner/_work/_temp/*

  # CI 摘要报告
  summary:
    name: CI 执行摘要
    runs-on: [self-hosted, macos-arm64]
    needs: [quick-checks, parallel-tests, incremental-build, quality, rust-checks]
    if: always()

    steps:
      - name: 📊 生成摘要报告
        run: |
          echo "# 📊 CI 执行摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**执行时间**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "**触发事件**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 任务状态" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 快速检查: ${{ needs.quick-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 并行测试: ${{ needs.parallel-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ 增量构建: ${{ needs.incremental-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 代码质量: ${{ needs.quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔧 Rust检查: ${{ needs.rust-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 优化效果" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ 增量检查: 仅分析变更文件" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 并行测试: 4 分片同时执行" >> $GITHUB_STEP_SUMMARY
          echo "- 💾 智能缓存: pnpm 离线优先" >> $GITHUB_STEP_SUMMARY
          echo "- 🧹 自动清理: 临时文件自动删除" >> $GITHUB_STEP_SUMMARY
          echo "- 🔁 Rust重试: 失败自动重试3次" >> $GITHUB_STEP_SUMMARY
          echo "- 💪 内存优化: Node.js堆内存限制3GB" >> $GITHUB_STEP_SUMMARY
          echo "- 🎯 并发控制: 最多2个任务同时运行" >> $GITHUB_STEP_SUMMARY

      - name: ✅ 完成摘要
        run: |
          echo "✅ CI 摘要已生成"
          echo "查看: https://github.com/xujian519/YunPat/actions/runs/${{ github.run_id }}"
