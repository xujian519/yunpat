name: CI (Simplified)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '24.x'
  PNPM_VERSION: 9
  # 跳过原生模块编译，解决 canvas 安装问题
  CANVAS_USE_NATIVE: '0'
  # 跳过可选依赖下载，减少安装时间
  PUPPETEET_SKIP_DOWNLOAD: 'true'

jobs:
  # 简化的TypeScript测试
  test:
    name: TypeScript 测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖（优化）
        run: |
          # 设置超时和重试
          echo "设置安装超时和重试机制..."
          # 使用 pnpm 的离线模式（如果有缓存）
          # 跳过后置安装脚本来加速
          pnpm install --no-frozen-lockfile --ignore-scripts || pnpm install --no-frozen-lockfile
        env:
          # 设置更长的超时时间（10分钟）
          PNPM_INSTALL_TIMEOUT: 600000
          # 跳过可选的后置安装脚本
          HUSKY: 0

      - name: TypeScript 类型检查
        run: pnpm build:tsc
        timeout-minutes: 5

      - name: 运行测试
        run: pnpm --filter @yunpat/core test -- --run
        timeout-minutes: 5

      - name: 构建项目
        run: pnpm build
        timeout-minutes: 5

  # 代码质量检查（可选，失败不阻塞）
  quality:
    name: 代码质量检查
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --no-frozen-lockfile

      - name: 运行 ESLint
        run: pnpm lint
        continue-on-error: true

      - name: 检查代码格式
        run: pnpm exec prettier --check "**/*.{ts,js,json,md}"
        continue-on-error: true
