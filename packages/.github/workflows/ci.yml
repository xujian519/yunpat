name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: 10

jobs:
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm lint

  type-check:
    name: TypeScript 类型检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm type-check
        continue-on-error: true

  build:
    name: 构建项目
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist
          retention-days: 7

  test:
    name: 测试 (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --no-frozen-lockfile

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages

      - name: 运行测试
        run: |
          MOCK_TESTS=true pnpm --filter "@yunpat/core" test -- --run
          pnpm --filter "@yunpat/orchestrator" test
          pnpm --filter "@yunpat/grpc-server" test

      - uses: codecov/codecov-action@v4
        if: matrix.node-version == 20
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security:
    name: 安全检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm audit --audit-level moderate
        continue-on-error: true

  dependency-review:
    name: 依赖审查
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
        continue-on-error: true

  integration-test:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: [lint, test]

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: yunpat
          POSTGRES_PASSWORD: yunpat123
          POSTGRES_DB: yunpat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm build

      - name: 运行集成测试
        run: |
          pnpm --filter "@yunpat/core" test -- --run
          pnpm --filter "@yunpat/patent-database" test -- --run 2>/dev/null || true
          pnpm --filter "@yunpat/patent-knowledge" test -- --run 2>/dev/null || true
        env:
          DATABASE_URL: postgresql://yunpat:yunpat123@localhost:5432/yunpat_test
          REDIS_URL: redis://localhost:6379
