name: 发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: 发布包
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建所有包
        run: pnpm build

      - name: 运行测试
        run: pnpm test -- --run

      - name: 创建发布日志
        id: changelog
        run: |
          echo "## 📦 发布内容" > release_notes.md
          echo "" >> release_notes.md
          echo "### 变更日志" >> release_notes.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0^) >> release_notes.md
          echo "release_notes=release_notes.md" >> $GITHUB_OUTPUT

      - name: 发布到npm
        run: pnpm publish -r --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 创建GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: ${{ steps.changelog.outputs.release_notes }}
          files: |
            packages/*/dist/*
            LICENSE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 部署文档
        run: |
          echo "📚 部署文档到GitHub Pages"
          # 这里可以添加文档部署命令
          # 例如: pnpm docs:build && pnpm docs:deploy

  notify:
    name: 发送通知
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - name: 发送成功通知
        run: |
          echo "✅ 发布成功！"
          echo "版本: ${{ github.ref_name }}"
          echo "仓库: ${{ github.repository }}"
