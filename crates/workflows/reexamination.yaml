flow_id: reexamination
flow_name: 复审请求
description: 从驳回决定分析到复审请求书撰写的完整流程
steps:
  - step_id: rejection_analysis
    step_name: 驳回决定分析
    order: 1
    agent_calls:
      - agent_id: reexamination
        output_key: rejection_summary
    requires_approval: false

  - step_id: supplementary_search
    step_name: 补充检索
    order: 2
    agent_calls:
      - agent_id: reexamination
        output_key: prior_art
    requires_approval: false

  - step_id: strategy_formulation
    step_name: 复审策略制定
    order: 3
    agent_calls:
      - agent_id: reexamination
        output_key: strategy
    requires_approval: true
    approval_prompt: 请审核复审策略，确认论证方向是否正确？

  - step_id: request_drafting
    step_name: 复审请求书撰写
    order: 4
    agent_calls:
      - agent_id: reexamination
        output_key: petition_draft
    requires_approval: false

  - step_id: verification
    step_name: 验证与程序跟踪
    order: 5
    agent_calls:
      - agent_id: reexamination
        output_key: final_package
    requires_approval: true
    approval_prompt: 复审请求文件是否可以提交？
    quality_check:
      dimensions:
        - 法律依据充分性
        - 事实准确性
        - 逻辑完整性
        - 程序合规性
      threshold: 7.5
      max_auto_retries: 2
      escalate_to_human: true

quality_dimensions:
  - name: 法律依据充分性
    description: 复审理由是否引用了正确的法律条文
    weight: 0.30
  - name: 事实准确性
    description: 对驳回决定的理解和反驳是否基于准确的事实
    weight: 0.25
  - name: 逻辑完整性
    description: 论证逻辑是否完整
    weight: 0.25
  - name: 程序合规性
    description: 是否符合复审请求的程序要求
    weight: 0.20
