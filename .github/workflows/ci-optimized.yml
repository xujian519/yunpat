name: CI (Optimized)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  PNPM_VERSION: 9

jobs:
  # 主构建和测试job
  build-and-test:
    name: 构建和测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖（优化）
        run: pnpm install --no-frozen-lockfile --prefer-offline --frozen-lockfile=false

      - name: 获取缓存
        uses: actions/cache@v3
        with:
          path: |
            **/dist
            **/node_modules/.cache
            .turbo
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: TypeScript 类型检查
        run: pnpm build:tsc

      - name: 运行测试
        run: pnpm --filter @yunpat/core test -- --run

      - name: 构建项目
        run: pnpm build

  # 代码质量检查（并行运行）
  quality:
    name: 代码质量检查
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 安装依赖（优化）
        run: pnpm install --no-frozen-lockfile --prefer-offline --frozen-lockfile=false

      - name: 运行 ESLint
        run: pnpm lint
        continue-on-error: true

      - name: 检查代码格式
        run: pnpm exec prettier --check "**/*.{ts,js,json,md}"
        continue-on-error: true
