name: 自动化任务

on:
  schedule:
    # 每周一上午10点运行（北京时间）
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  # 依赖更新检查
  dependency-review:
    name: 依赖安全检查
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 依赖审查
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: moderate

  # 代码清理
  code-cleanup:
    name: 代码质量检查
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 检查过期依赖
        run: |
          pnpm outdated || true

      - name: 运行代码检查
        run: |
          pnpm lint
          pnpm build:tsc

  # 自动关闭旧的 Issue
  stale-issues:
    name: 清理旧的 Issue
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 标记过期 Issue
        uses: actions/stale@v8
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            这个 Issue 已经 30 天没有活动了。如果没有进一步的进展，它将在 14 天后被自动关闭。
            如果这个问题仍然相关，请添加评论以防止它被关闭。
          close-issue-message: |
            由于缺乏活动，这个 Issue 已被自动关闭。如果需要，可以重新打开。

  # 生成统计报告
  stats-report:
    name: 生成项目统计
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成统计信息
        run: |
          echo "# 项目统计报告" > stats.md
          echo "" >> stats.md
          echo "生成时间: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> stats.md
          echo "" >> stats.md
          echo "## 代码统计" >> stats.md
          echo "- 总提交数: $(git rev-list --count HEAD)" >> stats.md
          echo "- 总分支数: $(git branch -a | wc -l)" >> stats.md
          echo "- 总标签数: $(git tag | wc -l)" >> stats.md
          echo "- TypeScript 文件数: $(find . -name "*.ts" -not -path "*/node_modules/*" | wc -l)" >> stats.md
          echo "- Rust 文件数: $(find . -name "*.rs" -not -path "*/target/*" | wc -l)" >> stats.md
          echo "- 代码行数: $(find . -name "*.ts" -o -name "*.rs" -not -path "*/node_modules/*" -not -path "*/target/*" | xargs wc -l | tail -1 | awk '{print $1}')" >> stats.md

      - name: 上传统计报告
        uses: actions/upload-artifact@v3
        with:
          name: project-stats
          path: stats.md