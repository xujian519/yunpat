name: CI (Local Runner Optimized)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '24.x'
  PNPM_VERSION: 9
  # 本地 Runner 环境变量
  ACTIONS_RUNNER_DISABLE_JOB_CACHE: 'true'  # 禁用 GitHub 缓存，使用本地缓存
  CANVAS_USE_NATIVE: '0'
  PUPPETEET_SKIP_DOWNLOAD: 'true'

jobs:
  # 快速检查（本地 Runner 优化）
  quick-checks:
    name: 快速检查
    runs-on: [self-hosted, macos-arm64]  # 指定使用 macOS ARM64 runner
    timeout-minutes: 15

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，用于工具分析

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 安装依赖（本地优化）
        run: |
          echo "📦 使用本地 pnpm 缓存加速安装..."
          pnpm install --no-frozen-lockfile --prefer-offline
        env:
          HUSKY: 0  # 跳过 Git hooks 安装

      - name: 🔍 TypeScript 类型检查
        run: |
          echo "🔍 开始 TypeScript 类型检查..."
          pnpm build:tsc
        timeout-minutes: 5

      - name: 📋 代码格式检查
        run: |
          echo "📋 检查代码格式..."
          pnpm exec prettier --check "**/*.{ts,js,json,md}" || true
        continue-on-error: true

      - name: 🧪 快速单元测试
        run: |
          echo "🧪 运行核心包测试..."
          pnpm --filter @yunpat/core test -- --run
        timeout-minutes: 10

      - name: 🧹 清理工作目录
        if: always()
        run: |
          echo "🧹 清理临时文件..."
          rm -rf ~/actions-runner/_work/_temp/*
          echo "✅ 清理完成"

  # 完整构建和测试
  build-and-test:
    name: 完整构建和测试
    runs-on: [self-hosted, macos-arm64]
    needs: quick-checks
    timeout-minutes: 20

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 安装依赖
        run: pnpm install --no-frozen-lockfile --prefer-offline
        env:
          HUSKY: 0

      - name: 🏗️ 构建所有包
        run: |
          echo "🏗️ 开始构建..."
          pnpm build
        timeout-minutes: 10

      - name: 🧪 运行所有测试
        run: |
          echo "🧪 运行完整测试套件..."
          pnpm test -- --run || echo "⚠️ 部分测试失败，继续执行"
        timeout-minutes: 15
        continue-on-error: true

      - name: 📊 代码覆盖率（可选）
        if: github.event_name == 'pull_request'
        run: |
          echo "📊 生成覆盖率报告..."
          pnpm --filter @yunpat/core test -- --coverage || true
        continue-on-error: true

      - name: 🧹 清理工作目录
        if: always()
        run: |
          rm -rf ~/actions-runner/_work/_temp/*
          echo "✅ 清理完成"

  # 代码质量检查（可选）
  quality:
    name: 代码质量检查
    runs-on: [self-hosted, macos-arm64]
    needs: quick-checks
    continue-on-error: true
    timeout-minutes: 10

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 安装依赖
        run: pnpm install --no-frozen-lockfile --prefer-offline
        env:
          HUSKY: 0

      - name: 🔍 ESLint 检查
        run: |
          echo "🔍 运行 ESLint..."
          pnpm lint || echo "⚠️ Lint 检查发现问题"
        continue-on-error: true

      - name: 📋 Prettier 格式检查
        run: |
          echo "📋 检查代码格式..."
          pnpm exec prettier --check "**/*.{ts,js,json,md}" || true
        continue-on-error: true

      - name: 🧹 清理
        if: always()
        run: rm -rf ~/actions-runner/_work/_temp/*

  # Rust 工具链检查（如果需要）
  rust-checks:
    name: Rust 工具链检查
    runs-on: [self-hosted, macos-arm64]
    if: github.event_name == 'push'
    continue-on-error: true
    timeout-minutes: 15

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔧 检查 Rust 环境
        run: |
          if command -v rustc &> /dev/null; then
            echo "✅ Rust 版本: $(rustc --version)"
            echo "✅ Cargo 版本: $(cargo --version)"
          else
            echo "⚠️ Rust 未安装，跳过 Rust 检查"
            exit 0
          fi

      - name: 🏗️ 构建 Rust 组件（如果存在）
        run: |
          if [ -d "patents/core" ]; then
            echo "🏗️ 构建 Rust 组件..."
            cd patents/core
            cargo build --release || echo "⚠️ Rust 构建失败"
          else
            echo "⚠️ 未找到 Rust 组件目录"
          fi
        continue-on-error: true

      - name: 🧹 清理
        if: always()
        run: rm -rf ~/actions-runner/_work/_temp/*
